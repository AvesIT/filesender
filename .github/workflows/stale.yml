name: "Close stale issues/pull requests"
on:
  schedule:
  - cron: "0,5,10,15,20,25,30,35,40,45,50,55 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write  # for actions/stale to close stale issues
      pull-requests: write  # for actions/stale to close stale PRs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v5
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue is stale because it has been open 60 days with no activity. Remove stale label or comment on this issue or this will be closed in 14 days'
        stale-pr-message: 'This pull request is stale because it has been open 60 days with no activity. Remove stale label or comment or this will be closed in 14 days'
        close-issue-message: 'This issue has been closed due to inactivity. If you are experiencing the same issue, please open a new ticket and mention this one.'
        close-pr-message: 'This pull request has been closed due to inactivity. Please resubmit or reopen the PR if the changes are ready to merge.'
        close-pr-label: 'Autoclose'
        close-issue-label: 'Autoclose'
        days-before-stale: 60
        days-before-close: 14
        operations-per-run: 500
        exempt-issue-labels: 'bug,hold'
        exempt-all-assignees: true
        debug-only: true
